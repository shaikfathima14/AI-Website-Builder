services:
  backend:
    build: ./backend
    container_name: ai-backend

    ports:
      - "5000:5000"

    volumes:
      - ./backend:/app
      - /app/node_modules

    command: node server.js

  frontend:
    build: ./frontend
    container_name: ai-frontend

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

    command: npm run dev -- --host